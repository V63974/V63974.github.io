<!DOCTYPE html>
<html lang="en" ng-app="LunchCheck">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunch Check</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body ng-controller="LunchCheckController">

    <h2>Enter the items you usually eat for lunch (comma-separated):</h2>
    
    <!-- Input field for lunch items -->
    <input type="text" ng-model="lunchItems" placeholder="e.g., sandwich, fruit, salad" />

    <!-- Button to trigger the check -->
    <button ng-click="checkLunch()">Check If Too Much</button>

    <!-- Display messages based on user input -->
    <p ng-show="message === 'Enjoy!'" style="color: green;">{{ message }}</p>
    <p ng-show="message === 'Too much!'" style="color: green;">{{ message }}</p>
    <p ng-show="message === 'Please enter data first'" style="color: red;">{{ message }}</p>

    <script src="app.js"></script>
</body>
</html>
